<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gallery | Ancient Architecture</title>

        <link rel="stylesheet" th:href="@{/css/search.css}" />
        <link rel="stylesheet" th:href="@{/css/gallery.css}" />
        <link rel="stylesheet" href="/src/main/resources/static/css/gallery.css" />
        <link rel="stylesheet" href="/src/main/resources/static/css/search.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

        <style></style>
    </head>
    <body>
        <div class="body_container">
            <nav class="navBar scrolled">
                <div class="nav-container">
                    <div class="brand">
                        <span class="logo"><i class="fas fa-archway"></i></span>
                        <span class="brand-name">Ancient Architecture</span>
                    </div>
                    <div class="nav-links">
                        <a href="/" class="nav-btn">Home</a>
                        <a href="/gallery" class="nav-btn" style="color: var(--accent)">Gallery</a>
                        <a href="/about" class="nav-btn">About</a>
                        <a href="/contact" class="nav-btn">Contact</a>
                    </div>
                </div>
            </nav>

            <div class="gallery-page-header">
                <h1 th:text="${architectures.size() + ' Ancient Architecture Structures'}">All Items</h1>
                <p>Browse all ancient architectural masterpieces</p>
            </div>

            <div class="gallery-filter-bar">
                <span>All Images</span>
                <span>Most Relevant</span>
            </div>
            <div class="pixabay-grid">
                <div
                    th:each="arch : ${architectures}"
                    class="pixabay-card"
                    th:onclick="|window.location.href = '/search?query=id:${arch.id}'|"
                >
                    <div class="pixabay-img-wrap">
                        <img
                            th:if="${arch.images != null and not #lists.isEmpty(arch.images)}"
                            th:src="${arch.images[0].imageUrl}"
                            alt="Architecture"
                        />
                        <img
                            th:if="${arch.images == null or #lists.isEmpty(arch.images)}"
                            src="/uploads/beijin.jpg"
                            alt="Default"
                        />
                    </div>

                    <div class="pixabay-card-info">
                        <h4 th:text="${arch.chineseName}">Building Name</h4>
                        <span th:text="${arch.dynasty}">Dynasty</span>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
